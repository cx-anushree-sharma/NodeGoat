name: Checkmarx One Security Scan

# Triggers: on push, PR, manual dispatch, and daily schedule
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC

jobs:
  checkmarx-scan:
    name: Scan on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    # Multi-platform matrix: run on Linux, Windows, macOS in parallel
    # (Advantage: "solution running on multiple platforms")
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # ---------- 1. Checkout source code ----------
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate scanning

      # ---------- 2. Install Python ----------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ---------- 3. Install Checkmarx CLI ----------
      # Downloads the official 'cx' binary for the current OS from GitHub releases.
      # Source: https://github.com/Checkmarx/ast-cli/releases
      - name: Install Checkmarx CLI (Linux)
        if: runner.os == 'Linux'
        run: |
          CLI_VERSION="2.3.27"
          wget -q "https://github.com/Checkmarx/ast-cli/releases/download/${CLI_VERSION}/ast-cli_linux_x64.tar.gz"
          tar -xzf ast-cli_linux_x64.tar.gz
          sudo mv cx /usr/local/bin/cx
          sudo chmod +x /usr/local/bin/cx
          cx version

      - name: Install Checkmarx CLI (macOS)
        if: runner.os == 'macOS'
        run: |
          CLI_VERSION="2.3.27"
          curl -sLO "https://github.com/Checkmarx/ast-cli/releases/download/${CLI_VERSION}/ast-cli_darwin_x64.tar.gz"
          tar -xzf ast-cli_darwin_x64.tar.gz
          sudo mv cx /usr/local/bin/cx
          sudo chmod +x /usr/local/bin/cx
          cx version

      - name: Install Checkmarx CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $CliVersion = "2.3.27"
          Invoke-WebRequest -Uri "https://github.com/Checkmarx/ast-cli/releases/download/$CliVersion/ast-cli_windows_x64.zip" -OutFile "ast-cli.zip"
          Expand-Archive -Path "ast-cli.zip" -DestinationPath "$env:USERPROFILE\cx-cli"
          echo "$env:USERPROFILE\cx-cli" | Out-File -FilePath $env:GITHUB_PATH -Append
          & "$env:USERPROFILE\cx-cli\cx.exe" version

      # ---------- 3.5. Pre-flight configuration validation ----------
      # Fails fast (in seconds) on misconfig instead of after a 10-min scan
      - name: Validate configuration (pre-flight check)
        env:
          CX_BASE_URI:      ${{ secrets.CX_BASE_URI }}
          CX_TENANT:        ${{ secrets.CX_TENANT }}
          CX_APIKEY:        ${{ secrets.CX_APIKEY }}
          CX_GROUP:         ${{ secrets.CX_GROUP }}
          CX_SOURCE:        .
          SMTP_SERVER:      ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python validate_config.py

      # ---------- 4. Run the Checkmarx scan script ----------
      - name: Run Checkmarx scan and send email summary
        env:
          # Checkmarx credentials (from GitHub Secrets)
          CX_BASE_URI:      ${{ secrets.CX_BASE_URI }}
          CX_TENANT:        ${{ secrets.CX_TENANT }}
          CX_APIKEY:        ${{ secrets.CX_APIKEY }}
          CX_GROUP:         ${{ secrets.CX_GROUP }}
          # Scan settings
          CX_PROJECT_NAME:  ${{ vars.CX_PROJECT_NAME || 'Vulnerable_CI_Pipeline' }}
          CX_BRANCH:        ${{ github.ref_name }}
          CX_SCAN_TYPES:    sast
          CX_SOURCE:        .
          # Email (from GitHub Secrets)
          SMTP_SERVER:      ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:       ${{ secrets.SMTP_USER }}
          EMAIL_FROM_NAME:  Checkmarx CI Pipeline
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          # Behavior
          FAIL_ON_SEVERITY: critical,high
          OUTPUT_PATH:      ./cx_reports
          OUTPUT_NAME:      checkmarx_report_${{ matrix.os }}
        # run: |
        #   python checkmarx_scan.py
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            python checkmarx_scan.py
          else
            python checkmarx_scan.py --skip-email
          fi
        shell: bash

      # ---------- 5. Upload report as build artifact ----------
      - name: Upload Checkmarx report
        if: always()  # Upload even if scan failed (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: checkmarx-report-${{ matrix.os }}
          path: cx_reports/
          retention-days: 30

